name: Generate Benchmark Dashboard

on:
  push:
    branches: [main]
    paths:
      - '_automation/benchmark-runner/runs/runs.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        run: python3 _automation/benchmark-runner/scripts/generate_dashboard.py

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate benchmark dashboard [skip ci]"
          file_pattern: "_automation/benchmark-runner/DASHBOARD.md"
