name: Scheduled Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**/SKILL.md'
      - 'plugins/**/evals/evals.json'
  workflow_dispatch:
    inputs:
      model:
        description: 'Model API ID (e.g. claude-sonnet-4-6)'
        required: false
        default: 'claude-sonnet-4-6'
      priority_skill:
        description: 'Skill name to prioritize (optional)'
        required: false
      priority_issue:
        description: 'Specific eval ID to run (e.g. github-issue-3)'
        required: false

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.repository == 'eric-zhang16/Biostatistics-skills'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Check for pending benchmark
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-6' }}"
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.priority_skill }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --priority-skill ${{ github.event.inputs.priority_skill }}"
          fi
          if [ -n "${{ github.event.inputs.priority_issue }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --priority-issue ${{ github.event.inputs.priority_issue }}"
          fi
          OUTPUT=$(python3 _automation/benchmark-runner/scripts/get_next_eval.py --model "$MODEL" $EXTRA_ARGS)
          if echo "$OUTPUT" | grep -q "STATUS: UP_TO_DATE"; then
            echo "status=up_to_date" >> "$GITHUB_OUTPUT"
            echo "All benchmarks are current."
          else
            echo "status=pending" >> "$GITHUB_OUTPUT"
            echo "Found pending benchmark."
          fi

      - name: Run benchmark via Claude Code
        if: steps.check.outputs.status == 'pending'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-6' }}"
          SKILL=$(cat _automation/benchmark-runner/SKILL.md)
          claude -p "$SKILL

Run benchmarks using model $MODEL. Follow the steps in the skill above exactly." \
                 --model "$MODEL"

      - name: Update run manifest and dashboard
        if: steps.check.outputs.status == 'pending'
        run: |
          python3 _automation/benchmark-runner/scripts/generate_dashboard.py

      - name: Commit updated files
        if: steps.check.outputs.status == 'pending'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update benchmark runs and dashboard [skip ci]"
          file_pattern: |
            _automation/benchmark-runner/runs/runs.json
            _automation/benchmark-runner/DASHBOARD.md
            plugins/**/evals/evals.json
