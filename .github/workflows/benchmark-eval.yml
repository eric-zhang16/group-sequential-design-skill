name: Scheduled Benchmarks

on:
  workflow_dispatch:
    inputs:
      model:
        description: Model API ID (e.g. claude-sonnet-4-6)
        required: false
        default: claude-sonnet-4-6
      priority_skill:
        description: Skill name to prioritize (optional)
        required: false
      priority_issue:
        description: Specific eval ID (e.g. github-issue-2)
        required: false
  push:
    branches: [main]
    paths:
      - plugins/**/evals/evals.json
permissions:
  contents: write
jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.repository == 'eric-zhang16/Biostatistics-skills'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @anthropic-ai/claude-code
      - name: Check for pending benchmark
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-6' }}"
          OUTPUT=$(python3 _automation/benchmark-runner/scripts/get_next_eval.py --model "$MODEL")
          echo "$OUTPUT" | grep -q "STATUS: UP_TO_DATE" && echo "status=up_to_date" >> "$GITHUB_OUTPUT" || echo "status=pending" >> "$GITHUB_OUTPUT"
      - name: Run benchmark
        if: steps.check.outputs.status == 'pending'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-6' }}"
          claude -p "$(cat _automation/benchmark-runner/SKILL.md)

Run benchmarks using model $MODEL." --model "$MODEL"
      - name: Commit results
        if: steps.check.outputs.status == 'pending'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update benchmark runs [skip ci]'
          file_pattern: _automation/benchmark-runner/runs/runs.json _automation/benchmark-runner/DASHBOARD.md
